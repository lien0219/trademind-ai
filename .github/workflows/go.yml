name: Go CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - "feat/**"
      - "fix/**"
      - "release/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - dev

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backend module
        run: |
          if [ ! -d backend ]; then
            echo "::error::CI requires a backend/ directory at the repository root, but it was not found."
            exit 1
          fi
          if [ ! -f backend/go.mod ]; then
            echo "::error::CI requires backend/go.mod to run Go checks, but the file was not found."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Check formatting (gofmt)
        working-directory: backend
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Go files are not formatted. Run go fmt ./... locally and commit the changes."
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Build
        working-directory: backend
        run: go build ./...
