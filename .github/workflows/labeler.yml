name: Pull Request Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: label changed areas
    runs-on: ubuntu-latest
    steps:
      - name: Label pull request
        uses: actions/labeler@v6
